name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x android-app/gradlew 2>/dev/null || true

      - name: Build APK
        working-directory: android-app
        run: |
          # Generate gradlew if not exists
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK (debug key)
        run: |
          APK_PATH=$(find android-app -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            # Generate debug keystore
            keytool -genkey -v -keystore /tmp/debug.keystore -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=STGBLOG,O=STGBLOG,C=US"
            
            # Sign with apksigner
            $ANDROID_HOME/build-tools/$(ls $ANDROID_BUILD_TOOLS_VERSION)/apksigner sign \
              --ks /tmp/debug.keystore --ks-key-alias androiddebugkey \
              --ks-pass pass:android --key-pass pass:android \
              "$APK_PATH"
            
            cp "$APK_PATH" stgblog.apk
            echo "APK built: stgblog.apk"
          else
            echo "No APK found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stgblog-app
          path: stgblog.apk
          if-no-files-found: error

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-latest
          name: STGBLOG APK (Latest)
          files: stgblog.apk
          body: |
            ## STGBLOG Android App
            
            安装说明：
            1. 下载 stgblog.apk
            2. 在手机上允许安装未知来源应用
            3. 安装并打开
            
            基于 WebView 封装，支持全部网页功能。
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
