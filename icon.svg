<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d9bf0"/>
      <stop offset="50%" style="stop-color:#1a7fdd"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d9bf0;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1d9bf0" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Glow circle -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)" opacity="0.12"/>
  <!-- STG text -->
  <text x="256" y="280" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="150" fill="url(#accent)" filter="url(#shadow)" letter-spacing="-6">STG</text>
  <!-- Accent line under text -->
  <rect x="120" y="310" width="272" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- BLOG subtitle -->
  <text x="256" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="52" fill="#71767b" letter-spacing="16">BLOG</text>
  <!-- Accent dot top-right -->
  <circle cx="412" cy="132" r="10" fill="#1d9bf0"/>
  <!-- Lock icon bottom-right -->
  <g transform="translate(385, 380) scale(0.75)">
    <rect x="0" y="12" width="26" height="20" rx="4" fill="none" stroke="#1d9bf0" stroke-width="2.5" opacity="0.6"/>
    <path d="M5 12V8a8 8 0 0 1 16 0v4" fill="none" stroke="#1d9bf0" stroke-width="2.5" opacity="0.6"/>
    <circle cx="13" cy="23" r="3" fill="#1d9bf0" opacity="0.8"/>
  </g>
</svg>
